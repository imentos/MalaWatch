name: MalaWatch
options:
  bundleIdPrefix: rkuo
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
settings:
  base:
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 4
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    DEVELOPMENT_TEAM: 2HQJC64KR8
    CODE_SIGN_STYLE: Automatic
targets:
  MalaWatch iOS:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: MalaWatch iOS App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rkuo.MalaWatch
        INFOPLIST_KEY_CFBundleDisplayName: MalaWatch
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  MalaWatch Watch App:
    type: application
    platform: watchOS
    sources:
      - path: Shared
      - path: MalaWatch Watch App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: rkuo.MalaWatch.watchkitapp
        INFOPLIST_KEY_CFBundleDisplayName: MalaWatch
        INFOPLIST_KEY_WKWatchOnly: YES
        TARGETED_DEVICE_FAMILY: 4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
